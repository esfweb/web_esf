name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Cambia a la rama que use AI Studio si no es main

# Permisos requeridos para escribir en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita ejecuciones simultáneas redundantes
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Usa npm ci para respetar estrictamente el package-lock.json

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite por defecto compila en la carpeta 'dist'
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4